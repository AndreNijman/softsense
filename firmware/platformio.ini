; Gripper controller — Waveshare General Driver for Robots (ESP32-WROOM-32)
; Build + flash:  pio run -t upload   (or ./flash.sh)
[platformio]
default_envs = general_driver

[env:general_driver]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags = -DCORE_DEBUG_LEVEL=0
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
; SCServo (Feetech bus servo) is bundled in lib/SCServo — no download needed.
