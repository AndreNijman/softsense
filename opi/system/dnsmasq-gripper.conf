# /etc/dnsmasq.d/gripper.conf -- DHCP + captive-portal DNS, wlan0 only.
interface=wlan0
bind-dynamic
except-interface=lo
no-resolv
no-hosts
dhcp-range=10.42.0.10,10.42.0.200,255.255.255.0,12h
dhcp-option=3,10.42.0.1
dhcp-option=6,10.42.0.1
# captive portal: every hostname resolves to the gripper so the phone's
# connectivity check lands on the control page.
address=/#/10.42.0.1
